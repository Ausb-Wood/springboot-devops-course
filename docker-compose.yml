services:
  springboot-app:
    # Kernvariante fuer den 10-Tage-Kurs:
    # Das Image wird direkt auf der Linux-VM aus dem aktuellen Quellcode gebaut.
    build: .
    image: springboot-devops-course:local
    container_name: springboot-course-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
