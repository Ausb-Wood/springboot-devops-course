# Port der Anwendung innerhalb des Containers und lokal in der VM.
server.port=8080

# Actuator stellt Betriebsendpunkte bereit. Fuer den Kurs reicht health.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

# Info-Ausgabe fuer Demonstrationen.
info.app.name=springboot-devops-course
info.app.description=Kursanwendung fuer Git, GitHub Actions, Docker und Kubernetes
