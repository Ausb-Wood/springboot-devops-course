services:
  springboot-app:
    # Optionale Praxisvariante:
    # Das Image wird nicht lokal gebaut, sondern aus GitHub Container Registry gezogen.
    image: ${IMAGE_NAME:-ghcr.io/ORG/springboot-devops-course:latest}
    container_name: springboot-course-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
